<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <style>
    /* 风格统一：使用相同的变量名和过渡效果 */
    :root { --bg: #ffffff; --main: #000000; }
    @media (prefers-color-scheme: dark) { :root { --bg: #1a1a1a; --main: #ffffff; } }

    .bg { fill: var(--bg); transition: fill 0.3s; }
    .stroke { stroke: var(--main); stroke-width: 1.5; fill: none; transition: stroke 0.3s; }
    .fill { fill: var(--main); transition: fill 0.3s; }
    
    text { 
      font-family: "Times New Roman", serif; 
      font-style: italic; 
      font-size: 19px; 
      text-anchor: middle; 
      fill: var(--main); 
      transition: fill 0.3s; 
    }
    .label { font-size: 17px; }
  </style>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="fill" />
    </marker>
  </defs>

  <rect width="100%" height="100%" class="bg" />

  <g class="stroke">
    <circle cx="100" cy="200" r="25" /> <circle cx="300" cy="100" r="25" /> <circle cx="300" cy="300" r="25" /> <circle cx="300" cy="200" r="25" /> <circle cx="300" cy="200" r="20" /> <circle cx="500" cy="200" r="25" /> </g>

  <g>
    <text x="100" y="206">S</text>
    <text x="300" y="106">A</text>
    <text x="300" y="306">C</text>
    <text x="300" y="206">H</text>
    <text x="500" y="206">B</text>
  </g>

  <g class="stroke" marker-end="url(#arrow)">
    <line x1="40" y1="200" x2="75" y2="200" /> 
    <path d="M 115,185 Q 200,140 285,115" /> 
    <path d="M 285,115 Q 200,160 115,185" /> 
    <line x1="125" y1="200" x2="275" y2="200" /> 
    <path d="M 115,215 Q 200,260 285,285" /> 
    <line x1="325" y1="115" x2="485" y2="185" /> 
    <line x1="325" y1="285" x2="485" y2="215" /> 
    <line x1="475" y1="200" x2="325" y2="200" />
    
    <path d="M 290,78 C 280,40 320,40 310,78" /> <path d="M 523,190 C 550,180 550,220 523,210" /> </g>

  <g class="label">
    <text x="160" y="145">a</text> <text x="160" y="185">a</text> <text x="175" y="195">a</text> <text x="160" y="265">b</text> <text x="400" y="140">b</text> <text x="400" y="275">a</text> <text x="310" y="35">a</text>  <text x="560" y="205">b</text>  <text x="350" y="222">a, b</text> </g>
</svg>
