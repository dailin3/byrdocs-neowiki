<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <style>
    /* 默认：浅色主题 */
    svg {
      --bg-color: #ffffff;
      --main-color: #000000;
    }

    /* 自动检测：深色主题 */
    @media (prefers-color-scheme: dark) {
      svg {
        --bg-color: #1a1a1a;
        --main-color: #ffffff;
      }
    }

    /* 全局过渡效果（可选，切换主题时更平滑） */
    rect, line, polygon, path, text {
      transition: fill 0.3s, stroke 0.3s;
    }

    .background { fill: var(--bg-color); }
    .stroke-main { stroke: var(--main-color); fill: none; stroke-width: 3; }
    .stroke-thin { stroke: var(--main-color); fill: none; stroke-width: 2; }
    .fill-match-bg { fill: var(--bg-color); stroke: var(--main-color); stroke-width: 3; }
    .text-main { fill: var(--main-color); font-family: "Times New Roman", serif; font-style: italic; }
  </style>

  <rect width="100%" height="100%" class="background" />
  
  <line x1="120" y1="100" x2="210" y2="100" class="stroke-main" stroke-width="4" />
  
  <polygon points="155,100 175,100 165,165" class="fill-match-bg" />
  
  <rect x="150" y="150" width="500" height="30" class="stroke-main" rx="1" />
  
  <text x="400" y="135" font-size="32" text-anchor="middle" class="text-main">L</text>
  <text x="400" y="250" font-size="42" text-anchor="middle" class="text-main">m</text>
  
  <g stroke-dasharray="8 4" class="stroke-thin">
    <line x1="150" y1="150" x2="150" y2="650" />
    <line x1="180" y1="150" x2="180" y2="650" />
    <line x1="150" y1="650" x2="180" y2="650" />
  </g>
  
  <path d="M 650 150 A 500 500 0 0 1 150 650" class="stroke-thin" stroke-dasharray="8 4" />
</svg>
