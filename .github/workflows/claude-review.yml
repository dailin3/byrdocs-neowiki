name: Claude Code Review

on:
  pull_request_target:
    types: [opened, synchronize, review_requested]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    if: |
      github.event.action == 'opened' ||
      github.event.action == 'synchronize' ||
      (github.event.action == 'review_requested' && github.event.requested_reviewer.login == 'claude[bot]')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
          fetch-depth: 0

      - name: Read review prompt
        id: prompt
        run: |
          {
            echo 'REVIEW_PROMPT<<EOF'
            cat .github/prompts/review.md
            echo 'EOF'
          } >> "$GITHUB_ENV"

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: "--model opus --allowedTools Read Grep Glob mcp__github__create_pending_pull_request_review mcp__github__add_pull_request_review_comment_to_pending_review mcp__github__submit_pending_pull_request_review mcp__github__get_pull_request mcp__github__get_pull_request_diff mcp__github__get_pull_request_files"
          prompt: ${{ env.REVIEW_PROMPT }}
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          ANTHROPIC_DEFAULT_OPUS_MODEL: "anthropic/claude-opus-4.7"
